<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRI O-RADS Analyzer | AI-Powered Medical Image Analysis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-mri"></i>
                <h1>MRI O-RADS Analyzer</h1>
            </div>
            <p class="tagline">AI-Powered Ovarian MRI Analysis with Groq API</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Upload Section -->
            <div class="upload-section">
                <div class="upload-card">
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Drag & Drop MRI Images Here</p>
                        <p class="small">or click to browse</p>
                        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/jpg" hidden>
                        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-folder-open"></i> Select Images
                        </button>
                    </div>
                    
                    <div class="file-list" id="fileList">
                        <h3>Selected Images (<span id="fileCount">0</span>)</h3>
                        <div class="file-grid" id="fileGrid"></div>
                    </div>
                    
                    <button class="btn btn-analyze" id="analyzeBtn" disabled>
                        <i class="fas fa-chart-line"></i> Analyze Images
                    </button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="resultsSection" style="display: none;">
                <div class="results-card">
                    <h2><i class="fas fa-clinic-medical"></i> Analysis Results</h2>
                    
                    <!-- Loading Indicator -->
                    <div class="loading" id="loadingIndicator" style="display: none;">
                        <div class="spinner"></div>
                        <p>Analyzing images with Groq AI...</p>
                    </div>
                    
                    <!-- Results Content -->
                    <div id="resultsContent"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p><i class="fas fa-shield-alt"></i> For medical professionals only. Always consult with a qualified radiologist.</p>
        </footer>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
